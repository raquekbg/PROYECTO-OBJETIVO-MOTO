<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proyecto Objetivo Moto</title>

<style>
body {
    button {
    background: #d9b8ff;
    color: #3b3b3b;
    border: none;
    padding: 15px 25px;
    border-radius: 20px;
    font-size: 17px;
    font-weight: bold;
    cursor: pointer;
}
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #111, #444);
    color: white;
    text-align: center;
    padding: 30px;
}

.card {
    background: white;
    color: #222;
    max-width: 500px;
    margin: auto;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

h1 {
    color: #d90000;
}

.moto {
    font-size: 60px;
}

.progress-container {
    background: #ddd;
    border-radius: 20px;
    overflow: hidden;
    margin: 20px 0;
}

.progress {
    background: #d90000;
    height: 30px;
    width: 20%;
}

.money {
    font-size: 28px;
    font-weight: bold;
}

button {
    background: #d90000;
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 16px;
}
</style>

</head>

<body>

<div class="card">

<div class="moto">🏍️</div>

<h1>Proyecto Objetivo Moto</h1>

<p>
El camino hacia la Honda CBR empieza aquí.
</p>

<h2>Dinero ahorrado</h2>

<h2>Ahorro conseguido</h2>

<div class="money" id="dinero">
400 € / 3000 €
</div>


<div class="progress-container">
    <div class="progress" id="barra"></div>
</div>


<button onclick="añadirDinero()">
Añadir ahorro 💜
</button>

<div class="progress-container">
<div class="progress"></div>
</div>

<p>
Cada kilómetro empieza con un pequeño paso.
</p>

<p>
❤️ De parte de alguien que cree en tus sueños.
</p>

</div>
<script>

const objetivo = 3000;

let ahorrado = localStorage.getItem("ahorroMoto");

if (ahorrado === null) {
    ahorrado = 400;
} else {
    ahorrado = Number(ahorrado);
}


function actualizar(){

    document.getElementById("dinero").innerHTML =
    ahorrado + " € / " + objetivo + " €";


    let porcentaje = (ahorrado / objetivo) * 100;

    if(porcentaje > 100){
        porcentaje = 100;
    }

    document.getElementById("barra").style.width =
    porcentaje + "%";

}


function añadirDinero(){

    let cantidad = prompt("¿Cuánto dinero quieres añadir?");

    if(cantidad !== null && cantidad !== ""){

        cantidad = Number(cantidad);

        ahorrado += cantidad;

        localStorage.setItem(
            "ahorroMoto",
            ahorrado
        );

        actualizar();
    }

}


actualizar();

</script>
</body>
</html>
