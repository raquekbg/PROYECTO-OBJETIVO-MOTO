<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Proyecto Objetivo Moto</title>

<style>

body {
    margin: 0;
    background: #d6d6d6;
    font-family: Arial, sans-serif;
    color: #555;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}


.contenedor {
    background: #ffffff;
    width: 90%;
    max-width: 650px;
    padding: 45px;
    border-radius: 30px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}


.moto {
    width: 120px;
    height: auto;
    margin-bottom: 20px;
}


h1 {
    color: #777;
    font-size: 42px;
    margin-bottom: 20px;
}


.subtitulo {
    font-size: 22px;
    margin-bottom: 35px;
}


h2 {
    font-size: 28px;
    color: #666;
}


.dinero {
    font-size: 38px;
    font-weight: bold;
    color: #555;
    margin: 25px;
}


.barra {
    width: 100%;
    height: 35px;
    background: #eeeeee;
    border-radius: 20px;
    overflow: hidden;
    margin: 30px 0;
}


.progreso {
    height: 100%;
    width: 0%;
    background: #888;
    transition: 0.5s;
}


button {
    background: #cdb0ff;
    border: none;
    padding: 18px 35px;
    border-radius: 30px;
    font-size: 20px;
    color: #555;
    font-weight: bold;
    cursor: pointer;
}


button:hover {
    background: #b894ff;
}


.mensaje {
    margin-top: 45px;
    font-size: 22px;
    line-height: 1.5;
    color:#666;
}


input {
    width: 120px;
    padding: 10px;
    font-size: 18px;
    border-radius: 10px;
    border: 1px solid #aaa;
    text-align:center;
}

</style>

</head>


<body>


<div class="contenedor">


<img class="moto" src="Moto.png" alt="Moto">


<h1>Proyecto Objetivo Moto</h1>


<div class="subtitulo">
El camino hacia la Honda CBR empieza aquí.
</div>


<h2>Dinero ahorrado</h2>


<div class="dinero">
<span id="ahorrado"></span> € / 
<span id="objetivo"></span> €
</div>



<div class="barra">
<div class="progreso" id="barra"></div>
</div>



<p>
Añadir dinero:
</p>

<input type="number" id="cantidad" placeholder="€">

<br><br>

<button onclick="añadirDinero()">
Añadir ahorro ❤️
</button>



<div class="mensaje">

Espero poder ayudarte a cumplir tus objetivos.<br>
Te amo mucho, feliz cumpleaños.

</div>


</div>



<script>


let ahorro = localStorage.getItem("ahorro");

let objetivo = localStorage.getItem("objetivo");


if(!ahorro){
    ahorro = 400;
}


if(!objetivo){
    objetivo = 3000;
}



function actualizar(){

document.getElementById("ahorrado").innerHTML = ahorro;

document.getElementById("objetivo").innerHTML = objetivo;


let porcentaje = (ahorro / objetivo) * 100;


if(porcentaje > 100){
    porcentaje = 100;
}


document.getElementById("barra").style.width = porcentaje + "%";


localStorage.setItem("ahorro", ahorro);

localStorage.setItem("objetivo", objetivo);

}



function añadirDinero(){

let cantidad = document.getElementById("cantidad").value;


cantidad = Number(cantidad);


if(cantidad > 0){

    ahorro = Number(ahorro) + cantidad;

    actualizar();

}


document.getElementById("cantidad").value="";

}



actualizar();


</script>


</body>
</html>
